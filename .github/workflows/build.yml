name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gradle:
    name: Gradle / Java ${{ matrix.java }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: [ '11', '17', '21' ]

    steps:
    - name: Checkout
      uses: actions/checkout@v7

    - name: Set up JDK ${{ matrix.java }}
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: ${{ matrix.java }}
        cache: 'gradle'

    - name: Build with Gradle
      run: ./gradlew --no-daemon check

    - name: Upload Gradle reports
      if: failure()
      uses: actions/upload-artifact@v7
      with:
        name: gradle-reports-java-${{ matrix.java }}
        path: |
          build/reports/
          build/test-results/
        if-no-files-found: ignore
        retention-days: 7

  maven:
    name: Maven / Java 11
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v7

    - name: Set up JDK 11
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '11'
        cache: 'maven'

    - name: Verify with Maven
      run: mvn -B -ntp verify

    - name: Validate Maven release archive
      run: |
        version="$(mvn -B -q -DforceStdout help:evaluate -Dexpression=project.version)"
        archive="target/htcleaner-${version}.tgz"
        jar="htcleaner-${version}-jar-with-dependencies.jar"

        test -f "${archive}"
        test "$(tar -tzf "${archive}")" = "${jar}"

    - name: Upload Maven reports
      if: failure()
      uses: actions/upload-artifact@v7
      with:
        name: maven-reports-java-11
        path: |
          target/site/
          target/spotbugsXml.xml
          target/surefire-reports/
        if-no-files-found: ignore
        retention-days: 7
